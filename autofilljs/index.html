<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Job Application Form</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <form class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8 space-y-6">
      <!-- HEADER -->
      <div>
        <h1 class="text-3xl font-bold">Job Application Form</h1>

        <p class="text-gray-500 mt-1">Fill in your details below</p>
      </div>

      <!-- NAME -->
      <div>
        <label class="block mb-2 font-medium"> Full Name </label>

        <input
          type="text"
          name="fullName"
          placeholder="Enter your full name"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
          required
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block mb-2 font-medium"> Email Address </label>

        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
          required
        />
      </div>

      <!-- PHONE -->
      <div>
        <label class="block mb-2 font-medium"> Phone Number </label>

        <input
          type="tel"
          name="phone"
          placeholder="Enter your phone number"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
        />
      </div>

      <!-- ADDRESS -->
      <div>
        <label class="block mb-2 font-medium"> Address </label>

        <textarea
          name="address"
          rows="3"
          placeholder="Enter your address"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
        ></textarea>
      </div>

      <!-- CGPA -->
      <div>
        <label class="block mb-2 font-medium"> CGPA </label>

        <input
          type="number"
          step="0.01"
          name="cgpa"
          placeholder="Enter your CGPA"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
        />
      </div>

      <!-- ROLE -->
      <div>
        <label class="block mb-2 font-medium"> Applying For </label>

        <select
          name="role"
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
          required
        >
          <option value="">Select Role</option>

          <option value="frontend">Frontend Developer</option>

          <option value="backend">Backend Developer</option>

          <option value="fullstack">Full Stack Developer</option>

          <option value="intern">Software Intern</option>
        </select>
      </div>

      <!-- COVER LETTER -->
      <div>
        <label class="block mb-2 font-medium"> Cover Letter </label>

        <textarea
          name="coverLetter"
          rows="6"
          placeholder="Write your cover letter..."
          class="w-full border rounded-xl p-3 outline-none focus:ring-2"
        ></textarea>
      </div>

      <!-- RESUME -->
      <div>
        <label class="block mb-2 font-medium"> Upload Resume </label>

        <input
          type="file"
          name="resume"
          accept=".pdf,.doc,.docx"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- PHOTO -->
      <div>
        <label class="block mb-2 font-medium"> Upload Photo </label>

        <input
          type="file"
          name="photo"
          accept="image/*"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- SUBMIT -->
      <button
        type="submit"
        class="w-full bg-black text-white rounded-xl p-4 font-semibold hover:opacity-90 transition"
      >
        Submit Application
      </button>
    </form>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <script type="module" src="./src/index.js"></script>
</html>
